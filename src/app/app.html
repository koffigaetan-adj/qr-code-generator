<div class="flex min-h-screen flex-col">
  <header class="border-b border-slate-200 dark:border-slate-800">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3">
      <a routerLink="/" class="flex items-center gap-2 font-semibold">
        <span class="flex h-8 w-8 items-center justify-center rounded-lg bg-brand-600 text-white">
          <app-icon name="link" [size]="16" />
        </span>
        {{ fr.app.title }}
      </a>
      <nav class="flex items-center gap-1">
        <a routerLink="/lot" class="btn-ghost">{{ fr.nav.batch }}</a>
        @if (auth.isSignedIn()) {
          <a routerLink="/mes-qr-codes" class="btn-ghost">{{ fr.auth.myQrCodes }}</a>
          <button type="button" class="btn-ghost" (click)="signOut()">{{ fr.auth.signOut }}</button>
        } @else {
          <button type="button" class="btn-ghost" (click)="signInWithGoogle()">{{ fr.auth.signInGoogle }}</button>
        }
        <app-theme-toggle />
      </nav>
    </div>
  </header>

  <main class="flex-1">
    <router-outlet />
  </main>

  <footer class="border-t border-slate-200 py-4 text-center text-xs text-slate-500 dark:border-slate-800 dark:text-slate-400">
    {{ fr.app.footer }}
  </footer>
</div>
