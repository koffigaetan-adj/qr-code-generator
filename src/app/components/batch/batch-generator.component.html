<div class="mx-auto max-w-5xl px-4 py-8">
  <h2 class="text-xl font-semibold mb-1">{{ fr.batch.title }}</h2>
  <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">{{ fr.batch.subtitle }}</p>

  <div class="card mb-6">
    <label class="btn-secondary cursor-pointer">
      <app-icon name="upload" [size]="16" /> {{ fr.batch.uploadCsv }}
      <input type="file" class="hidden" accept=".csv,text/csv" (change)="onFileSelected($event)" />
    </label>
    <p class="mt-2 text-xs text-slate-500 dark:text-slate-400">{{ fr.batch.dropHint }}</p>
    <p class="text-xs text-slate-500 dark:text-slate-400">{{ fr.batch.columnHint }}</p>
    @if (error()) {
      <p class="mt-2 text-xs text-red-600 dark:text-red-400">{{ error() }}</p>
    }
  </div>

  @if (entries().length > 0) {
    <div class="mb-4 flex items-center justify-between">
      <p class="text-sm text-slate-500 dark:text-slate-400">{{ entries().length }} {{ fr.batch.entriesFound }}</p>
      <button type="button" class="btn-primary" [disabled]="isExporting()" (click)="downloadAll()">
        <app-icon name="download" [size]="16" /> {{ fr.batch.downloadAll }}
      </button>
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
      @for (url of entries(); track url) {
        <div class="card flex flex-col items-center gap-2">
          <app-qr-preview [content]="url" [design]="design" [size]="140" />
          <p class="w-full truncate text-center text-xs text-slate-500 dark:text-slate-400" [title]="url">{{ url }}</p>
        </div>
      }
    </div>
  }
</div>
